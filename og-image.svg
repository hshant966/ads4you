<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,107,53,0.06)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,107,53,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Logo -->
  <text x="600" y="220" font-family="system-ui,sans-serif" font-size="80" font-weight="900" text-anchor="middle" letter-spacing="-2">
    <tspan fill="#f1f5f9">ads</tspan><tspan fill="#FF6B35">4</tspan><tspan fill="#f1f5f9">you</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="280" font-family="system-ui,sans-serif" font-size="22" font-weight="500" text-anchor="middle" fill="#94a3b8" letter-spacing="3" text-transform="uppercase">AI AUTOMATION STUDIO — WAKAD, PUNE</text>

  <!-- Divider -->
  <line x1="400" y1="310" x2="800" y2="310" stroke="#FF6B35" stroke-width="1" opacity="0.4"/>

  <!-- Tagline -->
  <text x="600" y="365" font-family="system-ui,sans-serif" font-size="30" font-weight="700" text-anchor="middle" fill="#f1f5f9">WhatsApp Bots · n8n Workflows · AI Chatbots</text>
  <text x="600" y="410" font-family="system-ui,sans-serif" font-size="22" text-anchor="middle" fill="#94a3b8">For Digital Marketing Agencies in Pune</text>

  <!-- Badges -->
  <rect x="200" y="455" width="180" height="40" rx="20" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.3)" stroke-width="1"/>
  <text x="290" y="480" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#FF6B35">✦ Udyam Registered</text>

  <rect x="400" y="455" width="150" height="40" rx="20" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.3)" stroke-width="1"/>
  <text x="475" y="480" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#FF6B35">✦ GeM Listed</text>

  <rect x="570" y="455" width="160" height="40" rx="20" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.3)" stroke-width="1"/>
  <text x="650" y="480" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#FF6B35">✦ Skill India</text>

  <rect x="750" y="455" width="170" height="40" rx="20" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.3)" stroke-width="1"/>
  <text x="835" y="480" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#FF6B35">✦ Starts ₹2,500</text>

